# 設計根拠: docs/security/jspdf-vulnerabilities.md §6
# 関連 Issue: #24
# 関連 Issue: #67（audit-level high 引き上げと GHSA-ID 除外スクリプト導入）
name: security-audit

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  schedule:
    # 毎週月曜 09:00 JST 相当（00:00 UTC）。新規 GHSA を遅くとも 7 日以内に検知する目的。
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high 以上を GHSA-ID 除外付きでブロック)
        # 既知の到達不能 advisory（GHSA-f8cm-6447-x5h2 ほか）は scripts/audit-check.mjs で除外する。
        # 除外対象の根拠は docs/security/jspdf-vulnerabilities.md §2.1 / §2.2 / §2.3 / §2.4 / §6.2 (α) / §6.5。
        # 新規 high / critical advisory が出た場合は赤化する（早期検知が目的）。
        run: npm run audit:check
